<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Học tiếng Hàn</title>
<script>
  // FOUC fix — set dark class trước khi CSS load
  if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<script>
  tailwind.config = {
    darkMode: 'media',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'Noto Sans KR', 'system-ui', 'sans-serif'],
          ko: ['Noto Sans KR', 'Apple SD Gothic Neo', 'sans-serif'],
        },
        colors: {
          accent: { 50:'#eff6ff', 100:'#dbeafe', 500:'#5b8def', 600:'#2f5fd0', 700:'#1e40af' },
        },
      }
    }
  }
</script>
<script src="../assets/app.js" defer></script>
<script src="../assets/lesson-viewer.js" defer></script>
</head>
<body data-topic="summary" class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 font-sans antialiased min-h-screen">

<!-- Top bar -->
<header class="sticky top-0 z-30 bg-white/85 dark:bg-slate-900/85 backdrop-blur border-b border-slate-200 dark:border-slate-800">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
    <button id="ks-toggle-sidebar" class="lg:hidden p-2 -ml-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Mở danh sách bài học">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <a href="../index.html" class="flex items-center gap-2 font-semibold hover:text-accent-600">
      <span class="text-xl">🇰🇷</span>
      <span class="hidden sm:inline">Học tiếng Hàn</span>
    </a>
    <span class="text-slate-400">/</span>
    <span class="font-semibold"><span data-bind="title">…</span> <span data-bind="titleKo" class="text-slate-400 font-normal" lang="ko"></span></span>
    <div class="ml-auto flex items-center gap-3">
      <span id="ks-progress-text" class="text-sm text-slate-500 dark:text-slate-400 hidden sm:inline tabular-nums">0/0</span>
      <div class="w-24 sm:w-36 h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
        <div id="ks-progress-bar" class="h-full bg-gradient-to-r from-accent-500 to-violet-500 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
    </div>
  </div>
</header>

<div class="max-w-6xl mx-auto flex gap-6 px-4 py-6 lg:py-8">

  <!-- Sidebar — desktop -->
  <aside id="ks-sidebar" class="hidden lg:block w-64 shrink-0">
    <div class="sticky top-20">
      <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm">
        <h2 class="font-bold text-lg mb-1" data-bind="title">…</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-4" data-bind="lessonCount">…</p>
        <ul id="ks-lesson-list" class="space-y-1"></ul>
      </div>
    </div>
  </aside>

  <!-- Sidebar drawer — mobile -->
  <div id="ks-sidebar-drawer" class="hidden fixed inset-0 z-40 lg:hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="ks-drawer-backdrop"></div>
    <aside class="absolute left-0 top-0 bottom-0 w-72 bg-white dark:bg-slate-900 shadow-xl p-4 overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-lg" data-bind="title">…</h2>
        <button id="ks-close-drawer" class="p-2 -mr-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Đóng">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M6 18l12-12"/></svg>
        </button>
      </div>
      <ul id="ks-lesson-list-mobile" class="space-y-1"></ul>
    </aside>
  </div>

  <!-- Main lesson viewer -->
  <main class="flex-1 min-w-0">
    <div id="ks-lesson-container" class="space-y-6">
      <div class="text-center py-20 text-slate-400">Đang tải bài học…</div>
    </div>

    <!-- Bottom prev/next nav -->
    <nav class="mt-8 flex items-center gap-3">
      <button id="ks-prev" class="flex-1 sm:flex-none px-5 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-accent-500 hover:text-accent-600 disabled:opacity-40 disabled:cursor-not-allowed transition-all font-medium flex items-center justify-center gap-2">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        <span>Trước</span>
      </button>
      <div class="hidden sm:block flex-1 text-center text-sm text-slate-500 dark:text-slate-400">
        <span id="ks-current-num">—</span> / <span id="ks-total-num">—</span>
      </div>
      <button id="ks-next" class="flex-1 sm:flex-none px-5 py-3 rounded-xl bg-gradient-to-r from-accent-500 to-violet-500 hover:from-accent-600 hover:to-violet-600 text-white shadow-md shadow-accent-500/30 disabled:opacity-40 disabled:cursor-not-allowed transition-all font-medium flex items-center justify-center gap-2">
        <span>Tiếp</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </nav>
  </main>
</div>

</body>
</html>
